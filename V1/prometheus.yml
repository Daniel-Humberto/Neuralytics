global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'agent-ai-stack'
    environment: 'production'
    datacenter: 'slp-mx'

rule_files:

scrape_configs:

  # =============================================
  # INFRAESTRUCTURA BASE
  # =============================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 30s
    metrics_path: '/metrics'
    scrape_timeout: 10s

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node_exporter:9100']
    scrape_interval: 15s
    metrics_path: '/metrics'
    scrape_timeout: 10s

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 8s

  # =============================================
  # BASES DE DATOS Y CACHÉ
  # =============================================
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres_exporter:9187']
    scrape_interval: 20s
    metrics_path: '/metrics'
    scrape_timeout: 15s

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis_exporter:9121']
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s

  # =============================================
  # SERVICIOS IA Y GPU
  # =============================================
  - job_name: 'nvidia-dcgm'
    static_configs:
      - targets: ['dcgm_exporter:9400']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 8s

  - job_name: 'qdrant'
    static_configs:
      - targets: ['qdrant_gpu:6333']
    metrics_path: '/metrics'
    scrape_interval: 20s
    scrape_timeout: 15s

  # =============================================
  # APLICACIONES CON MÉTRICAS NATIVAS
  # =============================================
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # =============================================
  # MÉTRICAS DE RED
  # =============================================
  - job_name: 'network-traffic'
    static_configs:
      - targets: ['node_exporter:9100']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 8s
    params:
      collect[]:
        - 'netdev'
        - 'netstat'
        - 'sockstat'

  - job_name: 'container-network'
    static_configs:
      - targets: ['cadvisor:8080']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 8s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
