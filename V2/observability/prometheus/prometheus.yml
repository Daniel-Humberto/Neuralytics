global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/rules/alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "fastapi-gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["fastapi-gateway:8000"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "node-exporter"
    scrape_interval: 30s
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "qdrant"
    scrape_interval: 30s
    metrics_path: /metrics
    static_configs:
      - targets: ["qdrant:6333"]

  - job_name: "ollama"
    static_configs:
      - targets: ["ollama:11434"]
