apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-gateway
  namespace: neuralytics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fastapi-gateway
  template:
    metadata:
      labels:
        app: fastapi-gateway
    spec:
      containers:
      - name: fastapi-gateway
        image: neuralytics/fastapi-gateway:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: neuralytics-config
