apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: neuralytics-ingress
  namespace: neuralytics
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: api.neuralytics.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: fastapi-gateway
            port:
              number: 8000
